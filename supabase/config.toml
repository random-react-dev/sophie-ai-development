# config.toml — Supabase project config (per-function settings)
#
# Why these are all `verify_jwt = false`:
#
# 1. The new 2026 `sb_publishable_…` API key format breaks the platform-level
#    JWT gateway on Edge Functions
#    (https://github.com/orgs/supabase/discussions/41834). Functions that
#    expect a user JWT must therefore disable platform-level verification
#    and authenticate internally via `userClient.auth.getUser()`.
#
# 2. Public webhook/share functions never
#    used a user JWT to begin with — listed here for explicitness so they
#    are not silently flipped by a future `deploy --all`.
#
# Functions absent from this file keep the platform default (verify_jwt = true).

# --- User-authenticated functions (auth enforced INSIDE the function) ---

[functions.check-talk-quota]
# Internal auth: userClient.auth.getUser() at index.ts:50-63.
verify_jwt = false

[functions.verify-purchase]
# Internal auth: supabaseAuth.auth.getUser() at index.ts:62.
verify_jwt = false

[functions.verify-play-purchase]
# Internal auth: userClient.auth.getUser().
verify_jwt = false

[functions.get-gemini-session]
# Internal auth: supabaseClient.auth.getUser() at index.ts:23-32.
verify_jwt = false

[functions.translate-text]
# Internal auth: supabaseClient.auth.getUser() at index.ts:42-48.
verify_jwt = false

# --- Public functions (no user-JWT expected) ---

[functions.apple-webhook]
# App Store Server Notifications V2 — JWS-verified inside the function.
verify_jwt = false

[functions.play-webhook]
# Google Play RTDN — delivered by Pub/Sub push, no Supabase user JWT.
verify_jwt = false

[functions.share-scenario]
# Public web page rendering shareable scenario links.
verify_jwt = false
